# eqos kiosk user ownership - runs early on boot via systemd-tmpfiles
# We only fix the directories we actually need. No recursion into huge caches.

# Top-level home and important subdirs (recursive is OK here)
Z /home/eqos               - eqos eqos 0755 -
Z /home/eqos/.cargo        - eqos eqos 0755 -
Z /home/eqos/.rustup       - eqos eqos 0755 -
Z /home/eqos/eQ            - eqos eqos 0755 -

# Non-recursive (z) for the heavy directories that contain thousands of files
z /home/eqos/eQ/target                  - eqos eqos 0755 -
z /home/eqos/.cargo/registry            - eqos eqos 0755 -
z /home/eqos/.cargo/registry/cache      - eqos eqos 0755 -
z /home/eqos/.cargo/registry/src        - eqos eqos 0755 -

# The final binary
z /usr/local/bin/eQ                     - eqos eqos 0755 -