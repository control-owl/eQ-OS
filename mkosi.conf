[Distribution]
Distribution=debian
Release=trixie
RepositoryKeyFetch=yes

[Output]
Format=disk
Output=eQ-OS
OutputDirectory=ISO
SplitArtifacts=yes

[Build]
WithNetwork=yes
ToolsTree=default
PackageCacheDirectory=mkosi.cache
Incremental=yes
Environment=MKOSI_CHROOT_SUPPRESS_CHOWN=1

[Validation]
Checksum=yes

[Kernel]
UKI=yes
CommandLine=
    console=tty1
    systemd.log_level=debug
    systemd.log_target=console
    loglevel=7
    panic=3

[Content]
Bootable=yes
Bootloader=uki
RootPassword=eQ
Packages=
    # Core
    linux-image-amd64
    util-linux
    systemd
    systemd-sysv
    systemd-boot-efi
    dbus
    udev
    dpkg

    # Git
    git
    ca-certificates
    curl

    # User
    passwd
    login
    usrmerge
    libpam-modules
    libpam-runtime

    # Rust
    libgcc-s1
    libc6
    build-essential
    pkg-config

    # DRM / input (for fbdev/DRM access)
    libdrm2
    libgbm1
    libinput10
    libudev1

    # Fonts
    fonts-dejavu-core
    libfontconfig1
    libfreetype6

    # Wayland
    libx11-dev
    libxcb1-dev
    libwayland-dev
    libxkbcommon-dev
    libgl1-mesa-dev