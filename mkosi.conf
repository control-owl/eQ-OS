[Output]
Format=disk
Output=eQ-OS
OutputDirectory=ISO
SplitArtifacts=yes
ImageVersion=0.0.1

[Distribution]
Distribution=debian
Release=trixie
RepositoryKeyFetch=yes

[PackageSet]
PackageSet=minimal

[Build]
WithNetwork=yes
ToolsTree=default
PackageCacheDirectory=mkosi.cache
BuildSourcesEphemeral=buildcache
BuildDirectory=mkosi.builddir
Incremental=yes
Environment=MKOSI_CHROOT_SUPPRESS_CHOWN=1

[Validation]
Checksum=yes
Verity=yes
VerityKey=keys/mkosi.key
VerityCertificate=keys/mkosi.crt

[Content]
Bootable=yes
Bootloader=grub
Locale=en_US.UTF-8
Timezone=Etc/UTC
Hostname=eQ-OS
CleanPackageMetadata=yes
KernelCommandLine=
    quiet splash
    plymouth.ignore-serial-consoles
    loglevel=3 audit=0
    systemd.show_status=false

RemoveFiles=
    /usr/share/doc/*
    /usr/share/man/*
    /usr/share/info/*
    /usr/share/locale/*/!C*
    /var/cache/apt/*
    /var/lib/apt/lists/*
    /usr/share/help/*
    /usr/share/zoneinfo/*
    /usr/lib/systemd/catalog/*

BuildPackages=
    build-essential
    git
    curl
    pkg-config
    dpkg-dev

Packages=
    # Core system
    linux-image-amd64
    systemd
    systemd-sysv
    dbus
    udev
    util-linux

    # GRUB for BIOS + UEFI
    grub-efi-amd64
    grub-efi-amd64-bin
    efibootmgr

    # Basics
    ca-certificates
    passwd
    login
    usrmerge
    libpam-modules
    libpam-runtime
    libpam-systemd

    # Rust
    libgcc-s1
    libc6

    # Minimal X11
    xserver-xorg
    xserver-xorg-core
    xserver-xorg-video-dummy
    xserver-xorg-input-libinput
    libinput10
    xinit
    x11-utils
    x11-xserver-utils
    mesa-utils
    libgl1-mesa-dri
    libglx-mesa0

    # GUI libs
    libx11-6
    libx11-xcb1
    libxcb1
    libxcb-render0
    libxcb-shape0
    libxcb-xfixes0
    libfontconfig1
    libfreetype6

    # Fonts
    fonts-dejavu-core

    # Plymouth
    plymouth
    plymouth-themes