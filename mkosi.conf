[Distribution]
Distribution=debian
Release=trixie
RepositoryKeyFetch=yes

[Output]
Format=disk
Output=eQ-OS
OutputDirectory=ISO
SplitArtifacts=yes

[Build]
WithNetwork=yes
ToolsTree=default
PackageCacheDirectory=mkosi.cache
Incremental=yes
Environment=MKOSI_CHROOT_SUPPRESS_CHOWN=1

[Validation]
Checksum=yes

[Kernel]
UKI=yes
CommandLine=console=tty1 systemd.log_level=debug systemd.log_target=console loglevel=7 panic=3

[Content]
Bootable=yes
Bootloader=uki
RootPassword=eQ
Packages=
    # Core system
    linux-image-amd64
    systemd
    systemd-sysv
    systemd-boot-efi
    dbus
    udev
    util-linux
    dpkg

    # Networking & basics
    git
    ca-certificates
    curl

    # User / login
    passwd
    login
    usrmerge
    libpam-modules
    libpam-runtime

    # Rust build dependencies
    libgcc-s1
    libc6
    build-essential
    pkg-config

    # Minimal X11 + software rendering
    xserver-xorg-core
    xserver-xorg-video-dummy
    xinit
    x11-utils
    x11-xserver-utils
    mesa-utils
    libgl1-mesa-dri
    libglx-mesa0

    # Libraries needed by egui / winit / Rust GUI crates (X11 backend)
    libx11-6
    libx11-xcb1
    libxcb1
    libxcb-render0
    libxcb-shape0
    libxcb-xfixes0
    libxkbcommon0
    libxkbcommon-x11-0
    libfontconfig1
    libfreetype6

    # Fonts
    fonts-dejavu-core