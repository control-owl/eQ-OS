name: Build eQ-OS ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build mkosi container
        run: |
          docker build -t mkosi-builder ${{ github.workspace }}

      - name: Run mkosi inside privileged container
        run: |
          docker run --privileged \
            -v ${{ github.workspace }}:/workspace \
            mkosi-builder \
            bash -c "
              cd /workspace
              mkdir -p keys
              if [ ! -f keys/mkosi.key ]; then mkosi genkey; fi
              mkosi build
            "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eq-os-image
          path: eQ-OS.raw
