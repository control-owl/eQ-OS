name: Release eQ-OS ISO

on:
  workflow_run:
    workflows: [ "Verify GPG Signature" ]
    types:
      - completed
    branches: [ "stable" ]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build mkosi container
        run: |
          docker build -t mkosi-builder ${{ github.workspace }}

      - name: Run mkosi inside privileged container
        run: |
          docker run --privileged \
            --tmpfs /work:rw,exec,size=4G \
            --tmpfs /var/tmp:rw,exec,size=4G \
            -v ${{ github.workspace }}/output:/output \
            mkosi-builder \
            bash -c "
              cd /workspace
              mkdir -p keys
              if [ ! -f keys/mkosi.key ]; then (cd keys && mkosi genkey); fi
              mkosi build

              cp -v /workspace/eQ-OS.raw /output/
              #cp -v /workspace/eQ-OS.vmlinuz /output/
              #cp -v /workspace/eQ-OS.initrd /output/
              cp -v /workspace/eQ-OS.SHA256SUMS /output/
            "
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: eQ-OS-iso
          path: output/

